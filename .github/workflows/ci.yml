name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Repo structure & hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Required files present
        run: |
          set -e
          for f in LICENSE README.md CHANGELOG.md docs/ghana-ehr-master-plan.md docs/VERSIONS.md work-packages/README.md; do
            test -f "$f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "Structure OK"

      - name: No Windows Zone.Identifier artifacts
        run: |
          ! find . -name '*:Zone.Identifier' -o -name '*Zone.Identifier*' | grep -v '^\./\.git' | grep . || { echo "Zone.Identifier files committed"; exit 1; }

      # Full-history scan via the gitleaks CLI. (gitleaks-action@v2 derives a
      # commit range from the push event, which breaks on the repo's first
      # push: <root-commit>^ does not exist.)
      - name: Secret scan (gitleaks)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git /repo --no-banner --redact --exit-code 1

  backend:
    name: Backend (ghanaemr-core)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ghanaemr-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # verify runs unit + contract tests and the jacoco >=80% line-coverage check
      - name: Build & test ghanaemr-core
        run: mvn -B clean verify

  # Grows with the codebase:
  #   WP-008 adds: lint → unit tests → build OMODs/ESMs → Trivy scan → docker
  #   build → push GHCR (digest-pinned) → staging auto-deploy → Playwright smoke.
  #   WP-021 adds the permanent two-user isolation suite as a required check.
